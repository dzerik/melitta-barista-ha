name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: How would you use this feature? What problem does it solve?
    validations:
      required: true
  - type: dropdown
    id: machine_model
    attributes:
      label: Machine model (if relevant)
      options:
        - Barista T Smart
        - Barista TS Smart
        - Both / Not applicable
