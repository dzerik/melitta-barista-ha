name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          pip install pytest pytest-cov pytest-asyncio pytest-timeout pytest-socket
          pip install homeassistant pytest-homeassistant-custom-component
          pip install bleak bleak-retry-connector pycryptodome

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --timeout=30 \
            --cov=custom_components/melitta_barista \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install linters
        run: pip install ruff bandit

      - name: Ruff
        run: ruff check custom_components/melitta_barista/

      - name: Bandit
        run: bandit -r custom_components/melitta_barista/ -ll
