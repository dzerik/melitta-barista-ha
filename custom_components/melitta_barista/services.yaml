brew_directkey:
  name: Brew DirectKey
  description: Brew a DirectKey recipe for the active profile.
  fields:
    entity_id:
      name: Entity
      description: The brew button entity of the machine.
      required: true
      selector:
        entity:
          domain: button
    category:
      name: Category
      description: "DirectKey category: espresso, cafe_creme, cappuccino, latte_macchiato, milk, milk_froth, water"
      required: true
      selector:
        select:
          options:
            - "espresso"
            - "cafe_creme"
            - "cappuccino"
            - "latte_macchiato"
            - "milk"
            - "milk_froth"
            - "water"
    two_cups:
      name: Two Cups
      description: "Brew two cups (2x mode)"
      required: false
      default: false
      selector:
        boolean:

save_directkey:
  name: Save DirectKey Recipe
  description: Save a customized DirectKey recipe for a profile and category.
  fields:
    entity_id:
      name: Entity
      description: The brew button entity of the machine.
      required: true
      selector:
        entity:
          domain: button
    category:
      name: Category
      description: "DirectKey category: espresso, cafe_creme, cappuccino, latte_macchiato, milk_froth, milk, water"
      required: true
      selector:
        select:
          options:
            - "espresso"
            - "cafe_creme"
            - "cappuccino"
            - "latte_macchiato"
            - "milk_froth"
            - "milk"
            - "water"
    profile_id:
      name: Profile ID
      description: Profile ID (0-8). Defaults to active profile if not specified.
      required: false
      selector:
        number:
          min: 0
          max: 8
          step: 1
    process1:
      name: Component 1 Process
      description: "Process type: coffee, milk, water"
      required: true
      default: "coffee"
      selector:
        select:
          options:
            - "coffee"
            - "milk"
            - "water"
    intensity1:
      name: Component 1 Intensity
      description: "Intensity: very_mild, mild, medium, strong, very_strong"
      required: false
      default: "medium"
      selector:
        select:
          options:
            - "very_mild"
            - "mild"
            - "medium"
            - "strong"
            - "very_strong"
    aroma1:
      name: Component 1 Aroma
      description: "Aroma: standard, intense"
      required: false
      default: "standard"
      selector:
        select:
          options:
            - "standard"
            - "intense"
    portion1_ml:
      name: Component 1 Portion (ml)
      description: Portion size in ml (multiples of 5).
      required: false
      default: 40
      selector:
        number:
          min: 5
          max: 250
          step: 5
          unit_of_measurement: ml
    temperature1:
      name: Component 1 Temperature
      description: "Temperature: cold, normal, high"
      required: false
      default: "normal"
      selector:
        select:
          options:
            - "cold"
            - "normal"
            - "high"
    shots1:
      name: Component 1 Shots
      description: "Shots: none, one, two, three"
      required: false
      default: "one"
      selector:
        select:
          options:
            - "none"
            - "one"
            - "two"
            - "three"
    process2:
      name: Component 2 Process
      description: "Process type for second component: none, coffee, milk, water"
      required: false
      default: "none"
      selector:
        select:
          options:
            - "none"
            - "coffee"
            - "milk"
            - "water"
    intensity2:
      name: Component 2 Intensity
      required: false
      default: "medium"
      selector:
        select:
          options:
            - "very_mild"
            - "mild"
            - "medium"
            - "strong"
            - "very_strong"
    aroma2:
