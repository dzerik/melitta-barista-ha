reset_recipe:
  name: Reset Recipe to Defaults
  description: Reset a recipe to factory defaults via the HD command.
  fields:
    entity_id:
      name: Entity
      description: A brew button entity of the target machine.
      required: true
      selector:
        entity:
          domain: button
    recipe_id:
      name: Recipe ID
      description: Recipe ID (200–223). Defaults to the currently selected recipe.
      required: false
      selector:
        number:
          min: 200
          max: 223
          step: 1

confirm_prompt:
  name: Confirm Machine Prompt
  description: Send HY to acknowledge an active machine prompt (move cup, flush, fill water...).
  fields:
    entity_id:
      name: Entity
      description: A brew button entity of the target machine.
      required: true
      selector:
        entity:
          domain: button

nivona_write_recipe_param:
  name: Nivona — Write standard-recipe param (experimental)
  description: >
    EXPERIMENTAL. Write a single byte of a Nivona standard recipe slot.
    Writes persist on the machine. Offsets are based on upstream
    reverse-engineering and have not been validated by this project on
    real Nivona hardware. Use at your own risk. Nivona only.
  fields:
    entity_id:
      name: Entity
      description: Any button entity of the target Nivona machine.
      required: true
      selector:
        entity:
          domain: button
    selector:
      name: Recipe selector
      description: Recipe selector byte (0..255, per family table).
      required: true
      selector:
        number:
          min: 0
          max: 255
          step: 1
    param_key:
      name: Parameter key
      description: >
        One of: strength, profile, two_cups, temperature,
        coffee_temperature, water_temperature, milk_temperature,
        milk_foam_temperature, overall_temperature,
        coffee_amount, water_amount, milk_amount, milk_foam_amount,
        preparation, enabled, icon.
      required: true
      selector:
        select:
          options:
            - strength
            - profile
            - two_cups
            - temperature
            - coffee_temperature
            - water_temperature
            - milk_temperature
            - milk_foam_temperature
            - overall_temperature
            - coffee_amount
            - water_amount
            - milk_amount
            - milk_foam_amount
            - preparation
            - enabled
            - icon
    value:
      name: Value
      description: Numeric value to write. Fluid amounts are in ml.
      required: true
      selector:
        number:
          min: 0
          max: 32767
          step: 1

nivona_write_mycoffee_param:
  name: Nivona — Write MyCoffee slot param (experimental)
  description: >
    EXPERIMENTAL. Write a single byte of a Nivona MyCoffee user slot.
    Writes persist on the machine. Offsets are based on upstream
    reverse-engineering and have not been validated by this project on
    real Nivona hardware. Use at your own risk. Nivona only.
  fields:
    entity_id:
      name: Entity
      description: Any button entity of the target Nivona machine.
      required: true
      selector:
        entity:
          domain: button
    slot:
      name: MyCoffee slot
      description: MyCoffee slot index (0..N, depends on model).
      required: true
      selector:
        number:
          min: 0
          max: 31
          step: 1
    param_key:
      name: Parameter key
      description: >
        One of: enabled, icon, strength, profile, two_cups, temperature,
        coffee_temperature, water_temperature, milk_temperature,
        milk_foam_temperature, overall_temperature,
        coffee_amount, water_amount, milk_amount, milk_foam_amount,
        preparation.
      required: true
      selector:
        select:
          options:
            - enabled
            - icon
            - strength
            - profile
            - two_cups
            - temperature
            - coffee_temperature
            - water_temperature
            - milk_temperature
            - milk_foam_temperature
            - overall_temperature
            - coffee_amount
            - water_amount
            - milk_amount
            - milk_foam_amount
            - preparation
    value:
      name: Value
      description: Numeric value to write.
      required: true
      selector:
        number:
          min: 0
          max: 32767
          step: 1

repair_connection:
  name: Repair pairing
  description: >
    Recover a wedged BLE pairing without removing the integration. After a
    long quiet period the ESPHome BLE proxy may end up caching a stale
    BLEDevice (frozen source UUID or address type), at which point all
    subsequent reconnect attempts fail with "HU handshake timeout" or "60s
    BluetoothDevicePairingResponse timeout" and the machine display shows
    a red Bluetooth indicator. This service reloads the ESPHome proxy
    config entry that owns the scanner, which evicts the cached device;
    the next advertisement rebuilds it with fresh details and the very
    next pair=True attempt succeeds. Equivalent to the old workaround of
    deleting and re-adding the integration, but preserves entity history.

sync_clock:
  name: Sync machine clock with Home Assistant time
  description: >-
    Push Home Assistant's current local time to the machine's RTC (setting CLOCK_SEND=21).
    Use this to correct a drifted clock manually, or call it from an automation.
    Without arguments, syncs all configured machines.
  fields:
    device_id:
      name: Device
      description: Specific machine to sync; omit to sync all configured machines.
      required: false
      selector:
        device:
          integration: melitta_barista
