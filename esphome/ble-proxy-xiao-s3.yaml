# ESPHome BLE Proxy — Seeed Studio XIAO ESP32-S3
#
# Full active Bluetooth proxy for Home Assistant.
# Replaces XIAO ESP32-C6 with a more stable dual-core S3.
#
# Hardware: Seeed Studio XIAO ESP32-S3
#   - Xtensa dual-core LX7 @ 240MHz
#   - BLE 5.0 + WiFi (802.11 b/g/n) 2.4GHz
#   - 8MB PSRAM + 8MB Flash
#   - Onboard antenna + U.FL connector for external antenna
#   - User LED on GPIO21
#
# Why S3 over C6:
#   - Dual-core: WiFi and BLE don't compete for CPU
#   - Mature chip: better NVS bond persistence across reboots
#   - More RAM: stable with higher connection_slots
#
# Flash:
#   1. First time (USB): esphome run ble-proxy-xiao-s3.yaml
#   2. Subsequent: OTA from HA ESPHome dashboard
#
# After flashing, HA auto-discovers the proxy.
# ---------------------------------------------------------------

substitutions:
  name: "ble-proxy-melitta"
  friendly_name: "BLE Proxy Melitta"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  # 2025.8 introduces the new top-level `api.actions:` schema used by
  # clear_ble_bonds / disconnect_ble_peer below. Older versions silently
  # ignore the block — this guard makes that obvious at compile time.
  min_version: 2025.8.0

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  framework:
    type: esp-idf

# PSRAM — required for ESP32-S3 with 8MB PSRAM (XIAO S3 uses octal)
psram:
  mode: octal
  speed: 80MHz

# ---------------------------------------------------------------
# Network
# ---------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE          # Max performance for BLE proxy

  # Fallback AP in case WiFi fails (for recovery)
  ap:
    ssid: "${name}-fallback"
    password: !secret fallback_ap_password

captive_portal:

# ---------------------------------------------------------------
# Home Assistant API + OTA
# ---------------------------------------------------------------
api:
  encryption:
    key: !secret api_encryption_key
  # Manual recovery action — call from HA Developer Tools or from
  # automations when pairing gets wedged. Clears the ESP32's BLE bond
  # table (esp_ble_remove_bond_device for every stored peer) so the
  # next `pair=True` from a Bluetooth-proxy client triggers a fresh
  # SMP exchange instead of presenting a stale LTK. See
  # https://github.com/dzerik/melitta-barista-ha/issues/10
  #
  # In HA: Developer Tools → Services →
  #   esphome.${name}_clear_ble_bonds → Call service
  # Then call melitta_barista.repair_connection (or use the panel's
  # Repair button) so the integration reconnects with the fresh bond.
  actions:
    - action: clear_ble_bonds
      then:
        - lambda: |-
            ESP_LOGW("ble_bonds", "Clearing all BLE bonds via HA service");
            int dev_num = esp_ble_get_bond_device_num();
            esp_ble_bond_dev_t dev_list[dev_num];
            esp_ble_get_bond_device_list(&dev_num, dev_list);
            for (int i = 0; i < dev_num; i++) {
              esp_ble_remove_bond_device(dev_list[i].bd_addr);
            }
            ESP_LOGW("ble_bonds", "Removed %d bonded device(s)", dev_num);

    # Surgical disconnect of a specific peer when bluetooth_proxy gets
    # stuck in `state: ESTABLISHED` after an `auth fail reason=82` (SMP
    # rejection from the peer). The connection slot keeps a half-closed
    # link and ignores fresh client-side connect requests; this forces
    # the GAP layer to drop it so the next request actually opens a
    # new SMP exchange.
    #
    # In HA: Developer Tools → Services →
    #   esphome.${name}_disconnect_ble_peer
    #   data: {peer_mac: "F1:2C:72:3F:75:ED"}
    - action: disconnect_ble_peer
      variables:
        peer_mac: string
      then:
        - lambda: |-
            esp_bd_addr_t bd_addr;
            int parsed = sscanf(peer_mac.c_str(),
              "%hhx:%hhx:%hhx:%hhx:%hhx:%hhx",
              &bd_addr[0], &bd_addr[1], &bd_addr[2],
              &bd_addr[3], &bd_addr[4], &bd_addr[5]);
            if (parsed == 6) {
              esp_err_t err = esp_ble_gap_disconnect(bd_addr);
              ESP_LOGW("ble_disconnect", "GAP disconnect %s -> %d",
                peer_mac.c_str(), (int) err);
            } else {
              ESP_LOGE("ble_disconnect", "Invalid MAC: %s", peer_mac.c_str());
            }

ota:
  - platform: esphome
    password: !secret ota_password

# ---------------------------------------------------------------
# Logging — reduce noise, keep useful info
# ---------------------------------------------------------------
logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG   # XIAO S3 uses USB-JTAG for serial
  logs:
    bluetooth_proxy: INFO
    esp32_ble_tracker: WARN        # Suppress per-advertisement spam
    component: ERROR

# ---------------------------------------------------------------
# Bluetooth — core proxy functionality
#
# ESP32-S3 is dual-core Xtensa. WiFi runs on core 0, BLE on core 1,
# so there's no CPU contention. Safe to use 4 connection slots
# (vs 3 on single-core C3/C6).
# See: https://esphome.io/components/bluetooth_proxy/
# ---------------------------------------------------------------
esp32_ble_tracker:
  scan_parameters:
    active: true        # Active scan for full device names

bluetooth_proxy:
  active: true           # REQUIRED for GATT connections (Melitta needs this)
  cache_services: true   # Cache BLE service discovery in NVS — faster reconnects
  connection_slots: 4    # S3 dual-core + 8MB PSRAM handles 4 slots reliably

# ---------------------------------------------------------------
# Status LED — GPIO21 (active LOW on XIAO ESP32-S3)
# ---------------------------------------------------------------
light:
  - platform: status_led
    name: "Status LED"
    id: board_status_led
    pin:
      number: GPIO21
      inverted: true
    internal: true         # Don't expose to HA, just for visual status

# ---------------------------------------------------------------
# Diagnostic sensors — monitor proxy health in HA
# ---------------------------------------------------------------
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    update_interval: 300s
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "WiFi SSID"
      entity_category: diagnostic

  # Live read of the on-chip BLE bond table — useful to confirm
  # clear_ble_bonds actually emptied NVS, or to see whether the
  # next pair=True actually stored anything.
  - platform: template
    name: "BLE bonds"
    id: ble_bonds_count
    entity_category: diagnostic
    update_interval: 30s
    lambda: |-
      char buf[8];
      snprintf(buf, sizeof(buf), "%d", esp_ble_get_bond_device_num());
      return std::string(buf);

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

  # Reboot the proxy into safe mode — disables all components except
  # API + OTA. Use this if a bad config (or a buggy custom action)
  # leaves the device unresponsive; safe-mode boot lets you OTA-flash
  # a fixed config without physical access.
  - platform: safe_mode
    name: "Safe Mode Boot"
    entity_category: diagnostic

  # NUCLEAR OPTION — wipes ALL NVS storage: bond table, ESPHome
  # cached state, every Preference. WiFi credentials and OTA password
  # are baked into the firmware at flash time (from secrets.yaml),
  # so they survive. Use this when clear_ble_bonds isn't enough and
  # you suspect deeper NVS corruption (e.g. stale OTA artifacts or
  # the proxy refuses to bond no matter what). After pressing, the
  # device reboots clean — Melitta integration → Repair will then
  # see a virgin ESP and run a fresh SMP exchange on the next pair.
  - platform: factory_reset
    name: "Factory reset"
    entity_category: diagnostic
