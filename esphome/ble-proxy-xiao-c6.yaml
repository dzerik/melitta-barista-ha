# ESPHome BLE Proxy — Seeed Studio XIAO ESP32-C6
#
# Full active Bluetooth proxy for Home Assistant.
# Replaces unstable USB BT adapter with a reliable WiFi-based BLE bridge.
#
# Hardware: Seeed Studio XIAO ESP32-C6
#   - RISC-V single-core @ 160MHz
#   - BLE 5.0 + WiFi 6 (802.11ax) 2.4GHz
#   - Onboard antenna + U.FL connector for external antenna
#   - User LED on GPIO15
#
# Flash:
#   1. First time (USB): esphome run ble-proxy-xiao-c6.yaml
#   2. Subsequent: OTA from HA ESPHome dashboard
#
# After flashing, HA auto-discovers the proxy.
# Remove the old USB BT adapter — it's no longer needed.
# ---------------------------------------------------------------

substitutions:
  name: "ble-proxy-melitta"
  friendly_name: "BLE Proxy Melitta"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  # Toggle antenna RF switch pins on boot (FM8625H on XIAO C6)
  on_boot:
    priority: 600
    then:
      - output.turn_on: rf_switch_enable
      # LOW = onboard antenna, HIGH = external U.FL antenna
      # Change to turn_on if using external antenna
      - output.turn_off: rf_antenna_select

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

# ---------------------------------------------------------------
# Network
# ---------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE          # Max performance for BLE proxy
  # enable_btm: true             # Uncomment for 802.11k/v roaming
  # enable_rrm: true

  # Fallback AP in case WiFi fails (for recovery)
  ap:
    ssid: "${name}-fallback"
    password: !secret fallback_ap_password

captive_portal:

# ---------------------------------------------------------------
# Home Assistant API + OTA
# ---------------------------------------------------------------
api:
  encryption:
    key: !secret api_encryption_key
  # Manual recovery action — call from HA Developer Tools or from
  # automations when pairing gets wedged. Clears the ESP32's BLE bond
  # table (esp_ble_remove_bond_device for every stored peer) so the
  # next `pair=True` from a Bluetooth-proxy client triggers a fresh
  # SMP exchange instead of presenting a stale LTK. See
  # https://github.com/dzerik/melitta-barista-ha/issues/10
  #
  # In HA: Developer Tools → Services →
  #   esphome.${name}_clear_ble_bonds → Call service
  # Then call melitta_barista.repair_connection (or use the panel's
  # Repair button) so the integration reconnects with the fresh bond.
  actions:
    - action: clear_ble_bonds
      then:
        - lambda: |-
            ESP_LOGW("ble_bonds", "Clearing all BLE bonds via HA service");
            int dev_num = esp_ble_get_bond_device_num();
            esp_ble_bond_dev_t dev_list[dev_num];
            esp_ble_get_bond_device_list(&dev_num, dev_list);
            for (int i = 0; i < dev_num; i++) {
              esp_ble_remove_bond_device(dev_list[i].bd_addr);
            }
            ESP_LOGW("ble_bonds", "Removed %d bonded device(s)", dev_num);

    # Surgical disconnect of a specific peer when bluetooth_proxy gets
    # stuck in `state: ESTABLISHED` after an `auth fail reason=82` (SMP
    # rejection from the peer). The connection slot keeps a half-closed
    # link and ignores fresh client-side connect requests; this forces
    # the GAP layer to drop it so the next request actually opens a
    # new SMP exchange.
    #
    # In HA: Developer Tools → Services →
    #   esphome.${name}_disconnect_ble_peer
    #   data: {peer_mac: "F1:2C:72:3F:75:ED"}
    - action: disconnect_ble_peer
      variables:
        peer_mac: string
      then:
        - lambda: |-
            esp_bd_addr_t bd_addr;
            int parsed = sscanf(peer_mac.c_str(),
              "%hhx:%hhx:%hhx:%hhx:%hhx:%hhx",
              &bd_addr[0], &bd_addr[1], &bd_addr[2],
              &bd_addr[3], &bd_addr[4], &bd_addr[5]);
            if (parsed == 6) {
              esp_err_t err = esp_ble_gap_disconnect(bd_addr);
              ESP_LOGW("ble_disconnect", "GAP disconnect %s -> %d",
                peer_mac.c_str(), (int) err);
            } else {
              ESP_LOGE("ble_disconnect", "Invalid MAC: %s", peer_mac.c_str());
            }

ota:
  - platform: esphome
    password: !secret ota_password

# ---------------------------------------------------------------
# Logging — reduce noise, keep useful info
# ---------------------------------------------------------------
logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG   # XIAO C6 uses USB-JTAG for serial
  logs:
    bluetooth_proxy: INFO
    esp32_ble_tracker: WARN        # Suppress per-advertisement spam
    component: ERROR

# ---------------------------------------------------------------
# Bluetooth — core proxy functionality
#
# ESP32-C6 is single-core RISC-V. Aggressive scan parameters
# (1100ms/1100ms) cause CPU contention between WiFi and BLE.
# Use defaults and on-demand scanning for stable operation.
# See: https://esphome.io/components/bluetooth_proxy/
# ---------------------------------------------------------------
esp32_ble_tracker:
  scan_parameters:
    # Use ESPHome defaults (interval=320ms, window=30ms).
    # Aggressive scanning provides no benefit on WiFi proxies
    # while increasing CPU usage on single-core chips.
    active: true        # Active scan for full device names

bluetooth_proxy:
  active: true           # REQUIRED for GATT connections (Melitta needs this)
  cache_services: true   # Cache BLE service discovery — faster reconnects
  connection_slots: 3    # 3 is safe for C6 RAM; max recommended 5

# ---------------------------------------------------------------
# Antenna control — FM8625H RF switch on XIAO ESP32-C6
# ---------------------------------------------------------------
output:
  - platform: gpio
    id: rf_switch_enable
    pin: GPIO3              # RF_SWITCH_EN — enables the RF switch IC

  - platform: gpio
    id: rf_antenna_select
    pin: GPIO14             # RF_ANT_SELECT — LOW=onboard, HIGH=external

switch:
  - platform: template
    name: "External Antenna"
    id: external_antenna
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - output.turn_on: rf_antenna_select
    turn_off_action:
      - output.turn_off: rf_antenna_select

# ---------------------------------------------------------------
# Status LED — GPIO15 (active LOW on XIAO C6)
# ---------------------------------------------------------------
light:
  - platform: status_led
    name: "Status LED"
    id: board_status_led
    pin:
      number: GPIO15
      inverted: true
      ignore_strapping_warning: true
    internal: true         # Don't expose to HA, just for visual status

# ---------------------------------------------------------------
# Diagnostic sensors — monitor proxy health in HA
# ---------------------------------------------------------------
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    update_interval: 300s
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "WiFi SSID"
      entity_category: diagnostic

button:
  - platform: restart
    name: "Restart"
    entity_category: config
