site_name: Melitta Barista & Nivona — HA Integration
site_description: Home Assistant integration for Melitta Barista T/TS Smart and Nivona NICR/NIVO coffee machines over BLE
site_url: https://dzerik.github.io/melitta-barista-ha/
repo_url: https://github.com/dzerik/melitta-barista-ha
repo_name: dzerik/melitta-barista-ha
edit_uri: edit/main/docs/

# Local-only RE / audit / scratch docs are .gitignore'd (.gitignore:23-37);
# mkdocs would still pick them up from the working tree. Exclude explicitly
# so a local `mkdocs build` cannot publish them by accident.
exclude_docs: |
  ai-coffee-sommelier.md
  multi-brand-architecture.md
  oem-eugster-protocol.md
  roadmap-oem-features.md
  habr-draft.md
  BACKLOG.md
  NIVONA_EMULATOR_AUDIT.md
  NIVONA_EMULATOR_AUDIT_V2.md
  NIVONA_HA_INTEGRATION_AUDIT.md
  NIVONA_RE_NOTES.md
  TODO_EMU_V0_7.md
  TODO_HA_V0_49.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - include-markdown

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture:
    - BLE architecture: BLE_ARCHITECTURE.md
    - Wire protocol: PROTOCOL.md
    - 'ADR-001: Brand profile abstraction': adr/001-brand-profile-abstraction.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dzerik/melitta-barista-ha
